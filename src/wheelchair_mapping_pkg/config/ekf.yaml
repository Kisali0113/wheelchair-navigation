ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    

    publish_acceleration: false
    use_control: false

    odom0: /wheel/odom
    odom0_config: [false, false, false, 
    		false, false, true, 
    		true, false, false, 
    		false, false, true, 
    		false, false, false]
    odom0_queue_size: 5

    imu0: /imu/data
    imu0_config: [false, false, false, 			
    		false, false, false, 
    		false, false, false, 
    		false, false, true, 
    		true, true, false]
    imu0_queue_size: 5
    imu0_remove_gravitational_acceleration: true

    base_link_frame: base_link
